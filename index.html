<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nos recettes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #fdfcfb, #e2d1c3);
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #38703a, #477349);
      color: white;
      padding: 1.5rem;
    }

    header h1 { font-size: 1.5rem; font-weight: 600; }
    header p { font-size: 0.9rem; color: rgba(255,255,255,0.8); margin-top: 4px; }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 1.25rem 1.5rem;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid #e5e3dc;
    }

    .filters input, .filters select {
      font-size: 0.9rem;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #faf9f7;
      flex: 1;
      min-width: 150px;
      outline: none;
    }

    .filters input:hover, .filters select:hover { border-color: #bbb; }

    .statut-toggle {
      display: flex;
      gap: 8px;
      padding: 0.75rem 1.5rem;
      background: rgba(255,255,255,0.7);
      border-bottom: 1px solid #e5e3dc;
    }

    .toggle-btn {
      font-size: 0.82rem;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid #ddd;
      background: #fff;
      cursor: pointer;
      color: #555;
      transition: all 0.15s;
    }

    .toggle-btn.active-validee { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
    .toggle-btn.active-atester { background: #fff8e1; color: #f57f17; border-color: #ffe082; }
    .toggle-btn.active-all { background: #f0f0f0; color: #333; border-color: #ccc; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 16px;
      padding: 1.5rem;
    }

    .card {
      background: rgba(235,95,158,0.3);
      backdrop-filter: blur(4px);
      border-radius: 14px;
      padding: 1.2rem 1.3rem;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      border: 1.5px solid transparent;
    }

    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
    .card.a-tester { border-color: #ffe082; background: rgba(255,253,245,0.5); }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
      gap: 8px;
    }

    .card-title { font-size: 1rem; font-weight: 600; }

    .badge-statut {
      font-size: 0.68rem;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .badge-validee { background: #e8f5e9; color: #2e7d32; }
    .badge-atester { background: #fff8e1; color: #f57f17; }

    .duree-row {
      display: flex;
      gap: 10px;
      margin-bottom: 6px;
    }

    .duree-item {
      font-size: 0.75rem;
      color: #666;
      background: #f5f4f0;
      border-radius: 8px;
      padding: 3px 8px;
    }

    .card-author { font-size: 0.8rem; color: #888; margin-bottom: 8px; }

    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .tag { font-size: 0.72rem; padding: 3px 10px; border-radius: 20px; background: #fff3cd; color: #856404; }

    .ingr-preview { font-size: 0.82rem; color: #666; line-height: 1.5; }

    .empty { text-align: center; color: #888; padding: 3rem; }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      padding: 1.5rem;
      overflow-y: auto;
    }

    .overlay.active { display: flex; align-items: flex-start; justify-content: center; }

    .modal {
      background: #c2fcfb;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 520px;
      position: relative;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      margin: auto;
    }

    .modal h2 { margin-bottom: 5px; }
    .modal-meta { font-size: 0.85rem; color: #777; margin-bottom: 0.5rem; }

    .modal-durees {
      display: flex;
      gap: 10px;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
    }

    .modal-duree-badge {
      font-size: 0.8rem;
      padding: 4px 12px;
      border-radius: 20px;
      background: #f0f0f0;
      color: #444;
    }
    .section {
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 12px;
}
    /* Ingrédients */
.ingredients {
  border: 1px solid #c8e6c9;
  background: #f8d596;
}

/* Ustensiles */
.ustensiles-section {
  border: 1px solid #bbdefb;
  background: #f7c4bf;
}

/* Préparation */
.preparation {
  border: 1px solid #ffe082;
  background: #fcb37e;
}

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      font-size: 0.8rem;
      border: none;
      background: #eee;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 1rem 0 6px;
    }

.section-label {
  font-size: 0.75rem;
  font-weight: 600;
  color: #888;
  margin-bottom: 6px;
}

    .ingr-list { list-style: none; padding: 0; }

    .ingr-list li {
      font-size: 0.9rem;
      line-height: 1.8;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ingr-list li.optionnel { color: #aaa; }

    .badge-optionnel {
      font-size: 0.65rem;
      padding: 1px 7px;
      border-radius: 10px;
      background: #f0f0f0;
      color: #aaa;
      border: 1px solid #e0e0e0;
      white-space: nowrap;
    }

    .modal ol { padding-left: 1.3rem; font-size: 0.9rem; line-height: 1.7; }
    .modal ul { padding-left: 1.3rem; font-size: 0.9rem; line-height: 1.7; }

    @media (max-width: 500px) {
      .grid { padding: 1rem; }
      .filters { padding: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>🍝 Nos recettes</h1>
  <p>T&T</p>
</header>

<div class="filters">
  <input type="text" id="searchIngr" placeholder="Ingrédient (ex: oeuf, riz…)" oninput="render()" />
  <select id="filterTime" onchange="render()">
    <option value="">Toute durée (total)</option>
    <option value="15">Moins de 15 min</option>
    <option value="30">Moins de 30 min</option>
    <option value="60">Moins de 60 min</option>
    <option value="60">Moins de 120 min</option>
  </select>
  <select id="filterAuthor" onchange="render()">
    <option value="">Tous les auteurs</option>
  </select>
</div>

<div class="statut-toggle">
  <button class="toggle-btn active-all" data-statut="" onclick="setStatut(this)">Toutes</button>
  <button class="toggle-btn" data-statut="validée" onclick="setStatut(this)">Validées</button>
  <button class="toggle-btn" data-statut="à tester" onclick="setStatut(this)">À tester</button>
</div>

<div class="grid" id="grid"></div>

<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal"></div>
</div>

<script>
let recettes = [];
let filtreStatut = '';

async function loadRecettes() {
  try {
    const res = await fetch('recettes.json');
    recettes = await res.json();
    populateAuthors();
    render();
  } catch(e) {
    document.getElementById('grid').innerHTML = '<div class="empty">Impossible de charger les recettes.</div>';
  }
}

function populateAuthors() {
  const authors = [...new Set(recettes.map(r => r.auteur))];
  const sel = document.getElementById('filterAuthor');
  authors.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a; opt.textContent = a;
    sel.appendChild(opt);
  });
}

function setStatut(btn) {
  filtreStatut = btn.dataset.statut;
  document.querySelectorAll('.toggle-btn').forEach(b => {
    b.classList.remove('active-all', 'active-validee', 'active-atester');
  });
  if (filtreStatut === '') btn.classList.add('active-all');
  else if (filtreStatut === 'validée') btn.classList.add('active-validee');
  else btn.classList.add('active-atester');
  render();
}

function dureeTotal(r) {
  return (r.duree_prep || 0) + (r.duree_cuisson || 0);
}

function render() {
  const ingr = document.getElementById('searchIngr').value.toLowerCase().trim();
  const maxTime = parseInt(document.getElementById('filterTime').value) || Infinity;
  const author = document.getElementById('filterAuthor').value;

  const filtered = recettes.filter(r => {
    if (ingr && !r.ingredients.some(i => i.nom.toLowerCase().includes(ingr))) return false;
    if (dureeTotal(r) > maxTime) return false;
    if (author && r.auteur !== author) return false;
    if (filtreStatut && r.statut !== filtreStatut) return false;
    return true;
  });

  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">Aucune recette ne correspond aux filtres.</div>';
    return;
  }

  grid.innerHTML = filtered.map(r => {
    const isATester = r.statut === 'à tester';
    const badgeClass = isATester ? 'badge-atester' : 'badge-validee';
    const badgeLabel = isATester ? '💡 À tester' : '✓ Validée';
    const cardClass = isATester ? 'card a-tester' : 'card';
    const ingrPreview = r.ingredients.slice(0, 4).map(i => i.nom).join(', ') + (r.ingredients.length > 4 ? '…' : '');
    const prepStr = r.duree_prep ? `<span class="duree-item">⏱ Prep ${r.duree_prep} min</span>` : '';
    const cuisStr = r.duree_cuisson ? `<span class="duree-item">🔥 Cuisson ${r.duree_cuisson} min</span>` : '';

    return `
      <div class="${cardClass}" onclick="openModal(${r.id})">
        <div class="card-top">
          <span class="card-title">${r.titre}</span>
          <span class="badge-statut ${badgeClass}">${badgeLabel}</span>
        </div>
        <div class="duree-row">${prepStr}${cuisStr}</div>
        <div class="card-author">par ${r.auteur}</div>
        <div class="tags">${r.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        <div class="ingr-preview">${ingrPreview}</div>
      </div>
    `;
  }).join('');
}

function openModal(id) {
  const r = recettes.find(x => x.id === id);
  const isATester = r.statut === 'à tester';
  const badgeClass = isATester ? 'badge-atester' : 'badge-validee';
  const badgeLabel = isATester ? '💡 À tester' : '✓ Validée';
  const prepStr = r.duree_prep ? `<span class="modal-duree-badge">⏱ Prep ${r.duree_prep} min</span>` : '';
  const cuisStr = r.duree_cuisson ? `<span class="modal-duree-badge">🔥 Cuisson ${r.duree_cuisson} min</span>` : '';

  const ingrHTML = r.ingredients.map(i => {
    if (i.optionnel) {
      return `<li class="optionnel">${i.nom} <span class="badge-optionnel">optionnel</span></li>`;
    }
    return `<li>${i.nom}</li>`;
  }).join('');

  document.getElementById('modal').innerHTML = `
    <button class="modal-close" onclick="closeModal()">fermer</button>
    <h2>${r.titre}</h2>
    <div class="modal-meta">
      par ${r.auteur} &nbsp;·&nbsp; <span class="badge-statut ${badgeClass}">${badgeLabel}</span><br>
      <span style="margin-top:4px; display:inline-block;">${r.tags.join(', ')}</span>
    </div>
    <div class="modal-durees">${prepStr}${cuisStr}</div>
  <div class="section ingredients">
  <div class="section-label">Ingrédients</div>
  <ul>
    ${r.ingredients.map(i => `<li>${i.nom || i}</li>`).join('')}
  </ul>
</div>

<div class="section ustensiles-section">
  <div class="section-label">Ustensiles</div>
  <ul class="ustensiles">
    ${r.ustensiles.map(u => `<li>${u}</li>`).join('')}
  </ul>
</div>

<div class="section preparation">
  <div class="section-label">Préparation</div>
  <ol>
    ${r.etapes.map(e => `<li>${e}</li>`).join('')}
  </ol>
</div>
`;
  document.getElementById('overlay').classList.add('active');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('active');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

loadRecettes();
</script>
</body>
</html>
